[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[project]
name = "fr-audio"  
version = "0.1.3"
description = "Provide a French infinitive verb and specify desired tense(s), the tool automatically downloads audio files for all person-specific conjugations"
authors = [
    { name = "Yenyen Wang", email = "wangyenyen.st00g@g2.nctu.edu.tw" }
]
readme = "README.md"
requires-python = ">= 3.9"
dependencies = [
    "verbecc>=2.0,<3.0",
    "edge-tts>=7.2,<8.0"
]

[project.optional-dependencies]
test = ["pytest"]
dev = [
    "pytest",
    "ruff",
    "pre-commit"
]

[project.scripts]
fr-audio = "fr_audio.main_cli:main"